    init({signal: ['font', 'webgl', 'canvas', 'navigator'], useImprovedFingerprint: true}).then(result => {
      setCookies({ b_id4: result.browserId });
    })
    .catch(error => {
      console.error('Error getting browser ID 4:', error);
    });

    function getUrlParams(type = 'employee_id') {
      const url = new URL(window.location.href);
      const urlParams = new URLSearchParams(url.search);
      urlParams.delete("id_type");
      if (type === 'employee_id') return `?id_type=employee_id&${urlParams.toString()}`
      if (type === 'phone') return `?id_type=phone&${urlParams.toString()}`
      if (type === 'saml') return `?id_type=saml&${urlParams.toString()}`
    }

    function setUrlParamsLoginEmployeeId() {
        const urlParams = getUrlParams();
        const urlParamsPhoneNumber = getUrlParams('phone');
        const urlParamsSaml = getUrlParams('saml');
        const element = document.getElementById("href-login-id");
        const elementPhone = document.getElementById("href-phone-id");
        const elementSaml = document.getElementById("href-saml-id");
        if(element)
          element.setAttribute("href", urlParams);

        if(elementPhone)
          elementPhone.setAttribute("href", urlParamsPhoneNumber);

        if(elementSaml)
          elementSaml.setAttribute("href", urlParamsSaml)
    }
    window.addEventListener("DOMContentLoaded", function() {
      setUrlParamsLoginEmployeeId();
      const applicationNameDiv = document.getElementById("application-name");
      const applicationName = applicationNameDiv.dataset.applicationName;

      trackAnalyticsEvent(Analytics.MIXPANEL, {
        event: `${EventAnalyticNames.SIGN_IN_VISIT} - ${EventAnalyticNames.MEKARI_ACCOUNT}`,
        Product: applicationName === "Mekari" ? "none" : applicationName,
        "Login Type": "Normal",
      }, true);

      // pass query param email to input field
      const url = new URL(window.location.href);
      const identifierType = new URLSearchParams(url.search).get('id_type');
      const emailValue = new URLSearchParams(url.search).get('email')

      if(identifierType === 'email' && typeof emailValue === "string" && emailValue !== '') {
        document.getElementById('user_email').value = emailValue
        document.getElementById('user_email').readOnly = true
      }

    });

    const errorMessage = document.querySelector('p').innerText;
    if(errorMessage.includes('Sesi anda telah kedaluwarsa, silakan sign in kembali.')) {
      if(window.dataLayer)
        window.dataLayer.push({
          event: 'sessionExpired',
          eventCategory:'SSO Internal',
          eventAction: 'track-error',
          eventLabel: errorMessage,
        });
    }

    var token = document.getElementsByName('csrf-token')[0].content;
    var authenticity_token = document.getElementsByName('authenticity_token')[0];

    authenticity_token.setAttribute("value", token);
    window.addEventListener('load', function() {
        const url = new URL(window.location.href);
        const urlParams = new URLSearchParams(url.search);
        initializeMoengage(urlParams.get('client_id'), 'production')
    })
  </script></body></html>
